services:
  app:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./backups:/app/backups
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: epi
      POSTGRES_USER: epi
      POSTGRES_PASSWORD: epi_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@empresa.com.br
      PGADMIN_DEFAULT_PASSWORD: pgadmin_change_me
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
